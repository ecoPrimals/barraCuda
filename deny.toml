# SPDX-License-Identifier: AGPL-3.0-or-later
#
# cargo-deny configuration for barraCuda
# ecoBin compliance: pure Rust, no banned C wrappers

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "AGPL-3.0-or-later",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
copyleft = "warn"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

deny = [
    # ecoBin: no OpenSSL
    { name = "openssl" },
    { name = "openssl-sys" },
    # ecoBin: no C TLS
    { name = "native-tls" },
]

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
