# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Lean CI — single job, shared build cache.
# Binary distribution handled by plasmidBin CI/CD (auto-harvest.yml).
# This workflow validates code quality only.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rustdoc
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Deny (advisories, bans, licenses, sources)
        run: |
          cargo install --locked cargo-deny || true
          cargo deny check

      - name: Install nextest
        run: |
          curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Test (lib — nextest ci profile)
        run: cargo nextest run --workspace --lib --profile ci
