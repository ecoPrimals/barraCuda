# barraCuda — Cargo configuration

# ── Test thread cap ──────────────────────────────────────────────────
# ~11 lib tests call BarraCudaPrimal::start() → barracuda::device::Auto::new()
# which creates wgpu Instance+Adapter+Device.  Under cargo test (single
# process, many threads), >2 concurrent device creations can SIGSEGV the
# Mesa/Vulkan driver.  nextest is unaffected (one device per process).
# Cap at 2 for safe default; override with RUST_TEST_THREADS=N for nextest
# or single-threaded debugging.
[env]
RUST_TEST_THREADS = { value = "2", force = false }

# ── Dev / test builds: prioritize compile speed over runtime perf ────
[profile.dev]
# Max codegen units → parallel LLVM → faster compile
codegen-units = 256
# Split debug info keeps binary smaller and link time lower
split-debuginfo = "unpacked"
# Opt dependencies at O2 — wgpu/naga are large; optimized deps run
# faster in tests (GPU init, shader validation) without slowing our compile.
[profile.dev.package."*"]
opt-level = 2

[profile.test]
codegen-units = 256
split-debuginfo = "unpacked"
[profile.test.package."*"]
opt-level = 2

# ── Release: size-optimized binary ───────────────────────────────────
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.release-fast]
inherits = "release"
opt-level = 3

# No patch.crates-io needed — barraCuda communicates with coralReef
# and toadStool via JSON-RPC IPC at runtime, not compile-time deps.
