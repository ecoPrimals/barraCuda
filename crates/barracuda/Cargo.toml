[package]
name = "barracuda"
version = "0.3.2"
edition = "2021"
authors = ["ecoPrimals Project"]
description = "barraCuda — BARrier-free Rust Abstracted Cross-platform Unified Dimensional Algebra. Vendor-agnostic GPU compute via WGSL."
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/barraCuda"
keywords = ["gpu", "tensor", "compute", "webgpu", "wgsl"]
categories = ["science", "hardware-support"]
rust-version = "1.87"

[dependencies]
thiserror = { workspace = true }

# GPU compute (WebGPU - vendor-agnostic)
wgpu = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }
naga = { workspace = true, optional = true }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }

# Utilities
etcetera = { workspace = true }
serde = { workspace = true }
serde_json = "1.0"
rand = { workspace = true }
rayon = { workspace = true }
blake3 = { workspace = true }
num-traits = { workspace = true }
half = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { version = "1.35", features = ["full"] }
approx = { workspace = true }
proptest = { workspace = true }
wgpu = { workspace = true }

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
unwrap_used = "warn"
# Casting — pervasive in GPU compute (u32↔usize↔f32↔f64 constantly)
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
cast_possible_wrap = "allow"
# Doc — evolving, not yet enforced
doc_markdown = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
# Naming — wgpu/physics APIs use domain-specific names
module_name_repetitions = "allow"
similar_names = "allow"
struct_field_names = "allow"
many_single_char_names = "allow"
# Style — subjective pedantic lints
must_use_candidate = "allow"
return_self_not_must_use = "allow"
items_after_statements = "allow"
too_many_arguments = "allow"
too_many_lines = "allow"
wildcard_imports = "allow"
enum_glob_use = "allow"
option_if_let_else = "allow"
manual_let_else = "allow"
single_match_else = "allow"
if_not_else = "allow"
redundant_else = "allow"
match_same_arms = "allow"
match_wildcard_for_single_variants = "allow"
default_trait_access = "allow"
# Numeric — scientific compute uses raw literals and float comparisons
unreadable_literal = "allow"
float_cmp = "allow"
manual_midpoint = "allow"
# GPU/async patterns
unused_async = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
unused_self = "allow"
trivially_copy_pass_by_ref = "allow"
# Struct/function complexity
struct_excessive_bools = "allow"
fn_params_excessive_bools = "allow"
implicit_hasher = "allow"
pub_underscore_fields = "allow"
missing_fields_in_debug = "allow"
inline_always = "allow"
wrong_self_convention = "allow"
# Formatting — scientific code uses specific formats
uninlined_format_args = "allow"
doc_comment_double_space_linebreaks = "allow"
# Re-allowed: high-volume warnings not worth fixing in bulk
needless_raw_string_hashes = "allow"
redundant_closure_for_method_calls = "allow"
bool_to_int_with_if = "allow"
cloned_instead_of_copied = "allow"
map_unwrap_or = "allow"
no_effect_underscore_binding = "allow"
format_push_string = "allow"
if_same_then_else = "allow"
needless_range_loop = "allow"
explicit_iter_loop = "allow"
used_underscore_binding = "allow"

[lints.rust]
missing_docs = "allow"

[features]
default = ["gpu", "domain-models"]

gpu = ["dep:wgpu", "dep:bytemuck", "dep:naga"]

# Domain model umbrella — enables all domain-specific modules.
# Disable with default-features = false to get pure math + GPU compute only.
# Individual domain features allow selective compilation for consumers
# that only need specific domains (e.g., hotSpring enables domain-pde).
domain-models = [
    "domain-esn",
    "domain-genomics",
    "domain-nn",
    "domain-pde",
    "domain-snn",
    "domain-timeseries",
    "domain-vision",
]
domain-esn = []
domain-genomics = []
domain-nn = []
domain-pde = []
domain-snn = []
domain-timeseries = ["domain-esn"]
domain-vision = []

serde = []
parallel = []
benchmarks = []
debug-pppm = []
[[bin]]
name = "validate_gpu"
required-features = ["gpu"]

[[bin]]
name = "bench_fp64_ratio"
required-features = ["gpu"]

[[bin]]
name = "bench_wgsize_nvk"
required-features = ["gpu"]

[[bin]]
name = "bench_f64_builtins"
required-features = ["gpu"]

