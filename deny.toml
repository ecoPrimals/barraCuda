# SPDX-License-Identifier: AGPL-3.0-or-later
#
# cargo-deny configuration for barraCuda
# ecoBin compliance: pure Rust, no banned C wrappers

[advisories]
version = 2
# v2: vulnerability, unmaintained, unsound, notice all default to deny
yanked = "warn"
# paste (RUSTSEC-2024-0436): transitive via wgpu → metal → paste.
# Unmaintained but no security impact; tracking upstream wgpu fix.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
# v2: unlicensed and copyleft default to deny
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "AGPL-3.0-or-later",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

deny = [
    # ecoBin: no OpenSSL
    { name = "openssl" },
    { name = "openssl-sys" },
    # ecoBin: no C TLS
    { name = "native-tls" },
    # ecoBin: no C crypto (ring uses C assembly / aws-lc)
    { name = "ring" },
    { name = "aws-lc-sys" },
]

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
