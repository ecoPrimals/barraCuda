[workspace]
resolver = "2"
members = [
    "crates/barracuda-core",
    "crates/barracuda",
]

[workspace.package]
version = "0.3.2"
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/barraCuda"
authors = ["ecoPrimals Project"]
rust-version = "1.87"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# GPU compute (vendor-agnostic via WebGPU)
wgpu = { version = "22", default-features = false, features = [
    "wgsl",
    "dx12",
    "metal",
    "webgpu",
    "vulkan-portability",
] }
bytemuck = { version = "1.14", features = ["derive"] }
naga = { version = "22.1", features = ["wgsl-in", "spv-out"] }

# Numerics
num-traits = "0.2"
rayon = "1.8"
rand = "0.9"

# Cryptographic hashing (for provenance, not crypto operations)
# 'pure' feature: no C SIMD assembly, fully pure Rust dependency chain
blake3 = { version = "1.5", features = ["pure"] }

# Utilities
etcetera = "0.8"
half = "2.4"

# CLI
clap = { version = "4", features = ["derive"] }

# RPC
tarpc = { version = "0.34", features = ["tokio1", "serde-transport", "serde-transport-json", "tcp"] }
futures = "0.3"

# Dev/test
tempfile = "3.8"
approx = "0.5"
proptest = "1.4"
