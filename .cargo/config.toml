# barraCuda — Cargo configuration

# No thread cap — the RwLock-guarded encoding model ensures correctness
# at any concurrency level. Override with RUST_TEST_THREADS=N if needed.
[env]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.release-fast]
inherits = "release"
opt-level = 3

# Local coralReef checkout for sovereign-dispatch development
[patch.crates-io]
coral-gpu = { path = "../coralReef/crates/coral-gpu" }
coral-reef = { path = "../coralReef/crates/coral-reef" }
coral-driver = { path = "../coralReef/crates/coral-driver" }
